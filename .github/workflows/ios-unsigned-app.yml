name: iOS Unsigned App

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Debug
        type: choice
        options:
          - Release
          - Debug
  push:
    branches: [main]
    paths:
      - "NewAPIAdmin/**"
      - "NewAPIAdminApp/**"
      - "Package.swift"
      - "project.yml"
      - ".github/workflows/ios-unsigned-app.yml"

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-14
    env:
      BUILD_CONFIGURATION: ${{ github.event.inputs.configuration || 'Debug' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Normalize Xcode Project Format
        run: |
          perl -0pi -e 's/objectVersion = [0-9]+;/objectVersion = 56;/g; s/compatibilityVersion = "Xcode [^"]+";/compatibilityVersion = "Xcode 15.0";/g' NewAPIAdmin.xcodeproj/project.pbxproj
          grep -E 'objectVersion|compatibilityVersion' NewAPIAdmin.xcodeproj/project.pbxproj

      - name: Show Xcode Project Info
        run: xcodebuild -list -project NewAPIAdmin.xcodeproj

      - name: Build Unsigned Simulator App
        run: |
          set -o pipefail
          set +e
          xcodebuild \
            -project NewAPIAdmin.xcodeproj \
            -scheme NewAPIAdmin \
            -configuration "$BUILD_CONFIGURATION" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SWIFT_OPTIMIZATION_LEVEL=-Onone \
            SWIFT_COMPILATION_MODE=singlefile \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee xcodebuild.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "## xcodebuild failed"
              echo
              echo '```text'
              tail -n 120 xcodebuild.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            tail -n 40 xcodebuild.log | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g' | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit "$STATUS"
          fi

      - name: Package App Artifacts
        run: |
          APP_PATH=$(ls -d build/DerivedData/Build/Products/${BUILD_CONFIGURATION}-iphonesimulator/*.app 2>/dev/null | /usr/bin/head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" NewAPIAdmin-unsigned-simulator-app.zip
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload NewAPIAdmin-unsigned-simulator.ipa

      - name: Upload Unsigned App
        uses: actions/upload-artifact@v4
        with:
          name: NewAPIAdmin-unsigned-app
          retention-days: 14
          path: |
            NewAPIAdmin-unsigned-simulator-app.zip
            NewAPIAdmin-unsigned-simulator.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NewAPIAdmin-ios-build-log
          retention-days: 14
          path: xcodebuild.log

      - name: Build Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Unsigned iOS Build

          Artifact: `NewAPIAdmin-unsigned-app`

          Files:
          - `NewAPIAdmin-unsigned-simulator-app.zip`
          - `NewAPIAdmin-unsigned-simulator.ipa`

          The `.ipa` is an unsigned simulator build and cannot be installed on an iPhone directly. It is intended for build verification.
          EOF
