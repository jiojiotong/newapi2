name: iOS Signed App

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
  push:
    branches: [main]
    paths:
      - "NewAPIAdmin/**"
      - "NewAPIAdminApp/**"
      - "Package.swift"
      - "project.yml"
      - ".github/workflows/ios-unsigned-app.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build Signed iOS App
    runs-on: macos-14
    env:
      BUILD_CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Normalize Xcode Project Format
        run: |
          perl -0pi -e 's/objectVersion = [0-9]+;/objectVersion = 56;/g; s/compatibilityVersion = "Xcode [^"]+";/compatibilityVersion = "Xcode 15.0";/g' NewAPIAdmin.xcodeproj/project.pbxproj
          grep -E 'objectVersion|compatibilityVersion' NewAPIAdmin.xcodeproj/project.pbxproj

      - name: Show Xcode Project Info
        run: xcodebuild -list -project NewAPIAdmin.xcodeproj

      - name: Install Signing Assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "$IOS_CERTIFICATE_P12_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISION_PROFILE_BASE64" ]; then
            echo "Missing signing secrets. Set IOS_CERTIFICATE_P12_BASE64, IOS_CERTIFICATE_PASSWORD, and IOS_PROVISION_PROFILE_BASE64."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/signing_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$PROFILE_PLIST")
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$PROFILE_PLIST")
          BUNDLE_ID=${APP_IDENTIFIER#${TEAM_ID}.}

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "TEAM_ID=$TEAM_ID"
            echo "BUNDLE_ID=$BUNDLE_ID"
          } >> "$GITHUB_ENV"

      - name: Archive Signed Device App
        run: |
          set -o pipefail
          set +e
          rm -rf build/DerivedData build/NewAPIAdmin.xcarchive build/export ExportOptions.plist
          xcodebuild \
            -project NewAPIAdmin.xcodeproj \
            -scheme NewAPIAdmin \
            -configuration "$BUILD_CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/NewAPIAdmin.xcarchive \
            -derivedDataPath build/DerivedData \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive 2>&1 | tee xcodebuild.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "## xcodebuild archive failed"
              echo
              echo "### Errors"
              echo '```text'
              grep -n -E "error:|Undefined symbols|ld:|clang: error|SwiftCompile|CodeSign|Provisioning profile|Signing" xcodebuild.log || true
              echo '```'
              echo
              echo "### Last log lines"
              echo '```text'
              tail -n 120 xcodebuild.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi

      - name: Export Signed IPA
        run: |
          set -o pipefail
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key>
            <false/>
            <key>method</key>
            <string>ad-hoc</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/NewAPIAdmin.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist 2>&1 | tee -a xcodebuild.log

      - name: Package App Artifacts
        run: |
          IPA_PATH=$(ls build/export/*.ipa 2>/dev/null | /usr/bin/head -n 1)
          APP_PATH=$(ls -d build/NewAPIAdmin.xcarchive/Products/Applications/*.app 2>/dev/null | /usr/bin/head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No .ipa file found"
            exit 1
          fi
          cp "$IPA_PATH" NewAPIAdmin-signed-device.ipa
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" NewAPIAdmin-signed-device-app.zip
          fi

      - name: Upload Signed App
        uses: actions/upload-artifact@v4
        with:
          name: NewAPIAdmin-signed-app
          retention-days: 14
          path: |
            NewAPIAdmin-signed-device.ipa
            NewAPIAdmin-signed-device-app.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ios-signed-${{ github.run_number }}
        run: |
          gh release create "$RELEASE_TAG" \
            NewAPIAdmin-signed-device.ipa \
            NewAPIAdmin-signed-device-app.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "iOS signed device build #${GITHUB_RUN_NUMBER}" \
            --notes "Signed ad-hoc iOS build for commit ${GITHUB_SHA}. Install only on devices included in the provisioning profile."

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NewAPIAdmin-ios-build-log
          retention-days: 14
          path: xcodebuild.log

      - name: Build Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Signed iOS Build

          Artifact: `NewAPIAdmin-signed-app`

          Release: `ios-signed-${{ github.run_number }}`

          Files:
          - `NewAPIAdmin-signed-device.ipa`
          - `NewAPIAdmin-signed-device-app.zip`

          The `.ipa` is an ad-hoc device build. It can only be installed on devices included in the provisioning profile.
          EOF
