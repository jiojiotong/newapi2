name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Swift Version
        run: swift --version

      - name: Build
        run: swift build -v 2>&1 | tee build.log

      - name: Test
        run: swift test 2>&1 | tee test.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-logs
          path: |
            build.log
            test.log
